<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<style>
@page {
  size: 210mm 297mm;
  margin: 0;
}
html, body {
  margin: 0;
  padding: 0;
  width: 210mm;
  height: 297mm;
  background: #ffffff;
  font-family: 'Noto Serif SC', 'Noto Serif SC', serif;
}

/* ═══ LAYER 0: Base ═══ */
.cover-base {
  position: absolute;
  inset: 0;
  background: #ffffff;
  z-index: 0;
}

/* ═══ LAYER 1: Background Decorative ═══ */
.cover-bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 1;
}
/* Grid pattern */
.cover-bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(31,118,146,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(31,118,146,0.04) 1px, transparent 1px);
  background-size: 50pt 50pt;
}
/* Right-side giant watermark */
.watermark-year {
  position: absolute;
  right: 20pt;
  top: 0.15 * 297mm;
  font-family: 'Noto Serif SC', serif;
  font-size: 160pt;
  font-weight: 900;
  color: rgba(31,118,146,0.04);
  line-height: 1;
  letter-spacing: -5pt;
  z-index: 1;
}

/* ═══ LAYER 2: Structure Lines ═══ */
.cover-lines {
  position: absolute;
  inset: 0;
  z-index: 2;
}
/* Top bar */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 15pt;
  background: #1f7692;
}
/* Left anchor line */
.left-anchor {
  position: absolute;
  left: 0.12 * 210mm;
  top: 0.10 * 297mm;
  width: 6pt;
  height: 0.80 * 297mm;
  background: #1f7692;
}
/* Meta separator */
.meta-separator {
  position: absolute;
  left: 0.12 * 210mm + 30pt;
  top: 0.73 * 297mm;
  width: 210mm * 0.45;
  height: 1pt;
  background: rgba(31,118,146,0.4);
}

/* ═══ LAYER 3: Text Content ═══ */
.cover-text {
  position: absolute;
  inset: 0;
  z-index: 3;
}
.content-x {
  position: absolute;
  left: calc(0.12 * 210mm + 40pt);
  width: calc(210mm * 0.65);
}

/* A - Kicker */
.kicker {
  position: absolute;
  top: 0.15 * 297mm;
  font-family: 'Noto Serif SC', serif;
  font-size: 14pt;
  font-weight: 400;
  letter-spacing: 4pt;
  color: rgba(27,26,24,0.55);
  text-transform: uppercase;
}

/* B - Hero Title */
.hero-title {
  position: absolute;
  top: 0.26 * 297mm;
  font-family: 'Noto Serif SC', serif;
  font-size: 42pt;
  font-weight: 700;
  color: #1b1a18;
  line-height: 1.3;
  letter-spacing: 2pt;
}

/* C - Summary */
.summary {
  position: absolute;
  top: 0.48 * 297mm;
  font-family: 'Noto Serif SC', serif;
  font-size: 15pt;
  font-weight: 400;
  color: rgba(27,26,24,0.80);
  line-height: 1.7;
  width: 210mm * 0.58;
}

/* D - Meta */
.meta {
  position: absolute;
  top: 0.76 * 297mm;
  font-family: 'Noto Serif SC', serif;
  font-size: 14pt;
  font-weight: 400;
  color: rgba(27,26,24,0.7);
  line-height: 2.0;
}

/* F - Footer */
.footer {
  position: absolute;
  bottom: 0.06 * 297mm;
  right: 0.08 * 210mm;
  font-family: 'Noto Serif SC', serif;
  font-size: 11pt;
  font-weight: 400;
  letter-spacing: 2pt;
  color: rgba(27,26,24,0.4);
}
</style>
</head>
<body>

<div class="cover-base"></div>

<div class="cover-bg">
  <div class="cover-bg-grid"></div>
  <div class="watermark-year">2026</div>
</div>

<div class="cover-lines">
  <div class="top-bar"></div>
  <div class="left-anchor"></div>
  <div class="meta-separator"></div>
</div>

<div class="cover-text">
  <div class="content-x">
    <div class="kicker">ML V2 Investment Analysis Report</div>
    <div class="hero-title">日本物業投資<br>機器學習預測報告</div>
    <div class="summary">
      基於 FRED 真實歷史數據，採用四種機器學習模型集成預測，<br>
      84 情景機率加權分析，評估日本住宅物業 10 年投資回報。<br>
      物業總價 HKD 320 萬 | 首期 60% | 按揭利率 3%
    </div>
    <div class="meta">
      Prepared for Andy<br>
      June 2026
    </div>
  </div>
  <div class="footer">CONFIDENTIAL</div>
</div>

</body>
</html>
