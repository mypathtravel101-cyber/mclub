<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
@page { size: 210mm 297mm; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 210mm; height: 297mm; background: #edecea; font-family: 'Noto Serif SC', 'WenQuanYi Zen Hei', serif; }
.cover {
  width: 210mm; height: 297mm; position: relative;
  background: linear-gradient(160deg, #edecea 0%, #e5e3df 100%);
}
.bg-fill {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #edecea;
}
.deco-line-v {
  position: absolute; left: 8%; top: 12%; width: 1px; height: 35%;
  background: #d5cfbe;
}
.deco-line-h {
  position: absolute; left: 8%; top: 47%; width: 25%; height: 1px;
  background: #d5cfbe;
}
.deco-block {
  position: absolute; right: 0; top: 0; width: 35%; height: 100%;
  background: linear-gradient(180deg, rgba(31,118,146,0.04) 0%, rgba(139,122,58,0.06) 100%);
  clip-path: polygon(30% 0, 100% 0, 100% 100%, 0% 100%);
}
.kicker {
  position: absolute; left: 10%; top: 22%;
  font-size: 11pt; letter-spacing: 4pt; color: #7a766f;
  text-transform: uppercase; font-weight: normal;
}
.hero {
  position: absolute; left: 10%; top: 28%; width: 55%;
  font-size: 30pt; font-weight: 700; color: #1b1a18;
  line-height: 1.3;
}
.hero-accent {
  color: #1f7692;
}
.summary-block {
  position: absolute; left: 10%; top: 52%; width: 50%;
  font-size: 11pt; color: #7a766f; line-height: 1.8;
}
.meta-block {
  position: absolute; left: 10%; bottom: 12%;
  font-size: 9.5pt; color: #7a766f; line-height: 1.7;
}
.footer-line {
  position: absolute; left: 10%; bottom: 8%; width: 30%; height: 1px;
  background: #d5cfbe;
}
.footer-text {
  position: absolute; left: 10%; bottom: 5%;
  font-size: 8pt; color: #a09d95; letter-spacing: 2pt;
}
.accent-dot {
  position: absolute; left: 10%; top: 47.5%; width: 6px; height: 6px;
  background: #1f7692; border-radius: 50%;
}
</style>
</head>
<body>
<div class="cover">
  <div class="bg-fill"></div>
  <div class="deco-block"></div>
  <div class="deco-line-v"></div>
  <div class="deco-line-h"></div>
  <div class="accent-dot"></div>
  <div class="kicker">投資風險分析報告</div>
  <div class="hero">
    <span class="hero-accent">84情景</span><br>
    風險模型<br>
    <span style="font-size:20pt; font-weight:400; color:#7a766f;">日本物業投資</span>
  </div>
  <div class="summary-block">
    基於30年歷史匯率及物業價格數據，本報告透過7種匯率情景、4種物業價格走勢及3種持有期的交叉組合，共生成84個投資情景，為香港投資者提供全面的風險評估分析。
  </div>
  <div class="meta-block">
    標的物業：大阪天王寺茶屋町地區<br>
    投資金額：日圓 62,400,000 / 港幣 3,200,000<br>
    模型：7 匯率 x 4 物業價格 x 3 持有期
  </div>
  <div class="footer-line"></div>
  <div class="footer-text">機密文件</div>
</div>
</body>
</html>
