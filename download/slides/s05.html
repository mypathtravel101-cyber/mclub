<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:720px;overflow:hidden;font-family:'Noto Sans SC',sans-serif;background:#f4f5f7}
.hdr{position:absolute;top:0;left:0;right:0;height:52px;display:flex;justify-content:space-between;align-items:center;padding:0 48px}
.hl{font-size:11px;color:#888;letter-spacing:2px}.hr{font-size:11px;color:#888}
.main{padding:68px 48px 40px}
.t{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700;color:#0a1a3a;margin-bottom:2px}
.ts{font-size:11px;color:#999;letter-spacing:1px;margin-bottom:16px}
.ln{width:100%;height:1px;background:#dde0e5;margin-bottom:16px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.st{background:#fff;border:1px solid #e8eaed;border-radius:8px;padding:18px;text-align:center}
.st .n{font-family:'Noto Serif SC',serif;font-size:40px;font-weight:700;color:#0a1a3a}
.st .lb{font-size:10px;color:#888;margin-top:3px;letter-spacing:.5px}
.st .ds{font-size:9px;color:#bbb;margin-top:3px}
.ca{background:#fff;border:1px solid #e8eaed;border-radius:8px;padding:6px}
.ca img{width:100%;display:block}
.fb{position:absolute;bottom:0;left:0;right:0;height:40px;display:flex;justify-content:space-between;align-items:center;padding:0 48px;border-top:1px solid #e8eaed}
.ft{font-size:9px;color:#bbb;letter-spacing:1px}
.dots{display:flex;gap:6px}
.dots i{width:5px;height:5px;border-radius:50%;background:#ddd;display:block}
.dots i:nth-child(5){background:#0a1a3a}
</style></head><body>
<div class="hdr"><div class="hl">STRESS TESTING &middot; PZC GROUP</div><div class="hr">05 / 06</div></div>
<div class="main">
<div class="t">MCLUB 雙變量壓力測試</div>
<div class="ts">Variable 1: FX Rate (12情景) &times; Variable 2: Property Value (7情景) = 84個壓力測試情景</div><div class="ln"></div>
<div class="stats">
<div class="st"><div class="n">84</div><div class="lb">測試情景總數</div><div class="ds">12個匯率情景 &times; 7個房價情景</div></div>
<div class="st"><div class="n" style="color:#1a6a3a">0</div><div class="lb">虧本情景數量</div><div class="ds">全部84個情景均錄得正回報</div></div>
<div class="st"><div class="n" style="color:#8a3a2a">2.20%</div><div class="lb">最低年化回報</div><div class="ds">房價-30% + 日圓貶值31%</div></div>
</div>
<div class="ca"><img src="stress_2var_heatmap.png"></div>
</div>
<div class="fb"><div class="ft">壓力測試 &middot; Stress Testing</div><div class="dots"><i></i><i></i><i></i><i></i><i></i><i></i></div></div>
</body></html>
