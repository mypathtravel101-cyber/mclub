<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:720px;overflow:hidden;font-family:'Noto Sans SC',sans-serif;position:relative}
.bg{position:absolute;inset:0;background:linear-gradient(135deg,#060d1f 0%,#0a1a3a 40%,#0d2247 100%)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.08}
.o1{width:500px;height:500px;background:#3a6ea5;top:-100px;right:-100px}
.o2{width:400px;height:400px;background:#1a3a6a;bottom:-80px;left:-80px}
.hdr{position:absolute;top:36px;left:48px;font-size:12px;color:rgba(255,255,255,.5);letter-spacing:2px;z-index:10}
.hdr-r{position:absolute;top:36px;right:48px;font-size:12px;color:rgba(255,255,255,.5);z-index:10}
.wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center}
h1{font-family:'Noto Serif SC',serif;font-size:66px;font-weight:700;color:#fff;text-align:center;line-height:1.15;letter-spacing:2px}
h1 span{display:block;font-size:30px;font-weight:300;color:rgba(255,255,255,.65);margin-top:10px;letter-spacing:4px}
.line{width:80px;height:2px;background:rgba(255,255,255,.35);margin:24px auto}
.sub{font-size:14px;color:rgba(255,255,255,.4);text-align:center;letter-spacing:6px;margin-bottom:40px}
.tags{display:flex;gap:28px;justify-content:center}
.tags span{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:1px}
.dt{width:3px;height:3px;background:rgba(255,255,255,.25);border-radius:50%;display:inline-block;vertical-align:middle}
.ft{position:absolute;bottom:32px;left:48px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;z-index:10}
.dots{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);display:block}
.dots i:first-child{background:rgba(255,255,255,.7)}
</style></head><body>
<div class="bg"></div><div class="orb o1"></div><div class="orb o2"></div>
<div class="hdr">JAPAN PROPERTY INVESTMENT &middot; PZC GROUP</div>
<div class="hdr-r">01 / 06</div>
<div class="wrap">
<h1>日本物業投資<span>風險與回報分析報告</span></h1>
<div class="line"></div>
<div class="sub">FX RISK &middot; STRESS TESTING &middot; RETURN ANALYSIS</div>
<div class="tags"><span>投資結構</span><i class="dt"></i><span>壓力測試</span><i class="dt"></i><span>匯率風險</span><i class="dt"></i><span>15年回報預測</span></div>
</div>
<div class="ft">PZC Group 百盛大通 — Wealth Management</div>
<div class="dots"><i></i><i></i><i></i><i></i><i></i><i></i></div>
</body></html>
