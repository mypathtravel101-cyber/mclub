<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:720px;overflow:hidden;font-family:'Noto Sans SC',sans-serif;position:relative}
.bg{position:absolute;inset:0;background:linear-gradient(135deg,#060d1f 0%,#0a1a3a 40%,#0d2247 100%)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.08}
.o1{width:500px;height:500px;background:#3a6ea5;top:-100px;left:-100px}
.o2{width:400px;height:400px;background:#1a3a6a;bottom:-80px;right:-80px}
.hdr-r{position:absolute;top:36px;right:48px;font-size:12px;color:rgba(255,255,255,.5);z-index:10}
.wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center}
h1{font-family:'Noto Serif SC',serif;font-size:60px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:2px}
.ln{width:60px;height:2px;background:rgba(255,255,255,.3);margin:20px auto}
.pts{display:flex;gap:36px;margin-bottom:44px}
.pt{text-align:center;max-width:150px}
.pt .n{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:rgba(255,255,255,.9)}
.pt .l{font-size:9px;color:rgba(255,255,255,.4);margin-top:5px;letter-spacing:.5px;line-height:1.5}
.ct{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;text-align:center;line-height:2}
.dots{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);display:block}
.dots i:last-child{background:rgba(255,255,255,.7)}
</style></head><body>

<div class="pt"><div class="n">0 / 84</div><div class="l">虧本情景<br>全部壓力測試正回報</div></div>
<div class="pt"><div class="n">15年</div><div class="l">按揭期滿<br>物業100%歸客戶</div></div>
