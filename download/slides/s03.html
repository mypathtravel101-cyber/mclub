<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:720px;overflow:hidden;font-family:'Noto Sans SC',sans-serif;background:#f4f5f7}
.hdr{position:absolute;top:0;left:0;right:0;height:52px;display:flex;justify-content:space-between;align-items:center;padding:0 48px}
.hl{font-size:11px;color:#888;letter-spacing:2px}.hr{font-size:11px;color:#888}
.main{padding:76px 48px 44px;display:flex;gap:36px}
.left{flex:1;display:flex;flex-direction:column}
.right{flex:1.2;display:flex;align-items:center;justify-content:center}
.right img{width:100%;max-width:560px;border-radius:6px;border:1px solid #e8eaed}
.t{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;color:#0a1a3a;margin-bottom:3px}
.ts{font-size:12px;color:#999;letter-spacing:1px;margin-bottom:24px}
.ln{width:100%;height:1px;background:#dde0e5;margin-bottom:24px}
.mr{display:flex;align-items:baseline;gap:16px;margin-bottom:14px;padding:16px 18px;background:#fff;border:1px solid #e8eaed;border-radius:8px}
.mn{font-family:'Noto Serif SC',serif;font-size:34px;font-weight:700;color:#0a1a3a;min-width:130px}
.mn small{font-size:13px;font-weight:400;color:#888}
.ml{font-size:11px;color:#666;line-height:1.5}
.tb{margin-top:auto;padding:16px 18px;background:#0a1a3a;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:space-between}
.tb .l{font-size:11px;opacity:.6}.tb .v{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700}
.tb .p{font-size:14px;font-weight:400;opacity:.8}
.fb{position:absolute;bottom:0;left:0;right:0;height:40px;display:flex;justify-content:space-between;align-items:center;padding:0 48px;border-top:1px solid #e8eaed}
.ft{font-size:9px;color:#bbb;letter-spacing:1px}
.dots{display:flex;gap:6px}
.dots i{width:5px;height:5px;border-radius:50%;background:#ddd;display:block}
.dots i:nth-child(3){background:#0a1a3a}
</style></head><body>
<div class="hdr"><div class="hl">RETURN ANALYSIS &middot; PZC GROUP</div><div class="hr">03 / 06</div></div>
<div class="main"><div class="left">
<div class="t">回報來源分解</div><div class="ts">Return Source Breakdown</div><div class="ln"></div>
<div class="mr"><div class="mn">4.48%<small>/年</small></div><div class="ml">淨租金現金回報<br>扣除按揭後實收</div></div>
<div class="mr"><div class="mn">+4.44%<small>/年</small></div><div class="ml">按揭本金償還<br>物業權益增長</div></div>
<div class="tb"><div><div class="l">綜合年回報率</div><div class="v">8.92%</div></div><div class="p">= HKD 214,075 / 年</div></div>
</div><div class="right"><img src="return_decomposition.png"></div></div>
<div class="fb"><div class="ft">回報分析 &middot; Return Analysis</div><div class="dots"><i></i><i></i><i></i><i></i><i></i><i></i></div></div>
</body></html>
