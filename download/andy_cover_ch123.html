<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<style>
@page {
  size: 210mm 297mm;
  margin: 0;
}
html, body {
  margin: 0;
  padding: 0;
  width: 210mm;
  height: 297mm;
  background: #ffffff;
  font-family: 'Noto Serif SC', serif;
}
.cover-base { position: absolute; inset: 0; background: #ffffff; z-index: 0; }
.cover-bg { position: absolute; inset: 0; overflow: hidden; z-index: 1; }
.cover-bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(31,118,146,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(31,118,146,0.04) 1px, transparent 1px);
  background-size: 50pt 50pt;
}
.watermark-year {
  position: absolute; right: 20pt; top: 0.15 * 297mm;
  font-family: 'Noto Serif SC', serif; font-size: 160pt; font-weight: 900;
  color: rgba(31,118,146,0.04); line-height: 1; letter-spacing: -5pt; z-index: 1;
}
.cover-lines { position: absolute; inset: 0; z-index: 2; }
.top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 15pt; background: #1f7692; }
.left-anchor {
  position: absolute; left: 0.12 * 210mm; top: 0.10 * 297mm;
  width: 6pt; height: 0.80 * 297mm; background: #1f7692;
}
.meta-separator {
  position: absolute; left: calc(0.12 * 210mm + 30pt); top: 0.73 * 297mm;
  width: 210mm * 0.45; height: 1pt; background: rgba(31,118,146,0.4);
}
.cover-text { position: absolute; inset: 0; z-index: 3; }
.content-x { position: absolute; left: calc(0.12 * 210mm + 40pt); width: calc(210mm * 0.65); }
.kicker {
  position: absolute; top: 0.15 * 297mm;
  font-family: 'Noto Serif SC', serif; font-size: 14pt; font-weight: 400;
  letter-spacing: 4pt; color: rgba(27,26,24,0.55);
}
.hero-title {
  position: absolute; top: 0.26 * 297mm;
  font-family: 'Noto Serif SC', serif; font-size: 42pt; font-weight: 700;
  color: #1b1a18; line-height: 1.3; letter-spacing: 2pt;
}
.summary {
  position: absolute; top: 0.48 * 297mm;
  font-family: 'Noto Serif SC', serif; font-size: 15pt; font-weight: 400;
  color: rgba(27,26,24,0.80); line-height: 1.7; width: 210mm * 0.58;
}
.meta {
  position: absolute; top: 0.76 * 297mm;
  font-family: 'Noto Serif SC', serif; font-size: 14pt; font-weight: 400;
  color: rgba(27,26,24,0.7); line-height: 2.0;
}
.footer {
  position: absolute; bottom: 0.06 * 297mm; right: 0.08 * 210mm;
  font-family: 'Noto Serif SC', serif; font-size: 11pt; font-weight: 400;
  letter-spacing: 2pt; color: rgba(27,26,24,0.4);
}
.part-tag {
  position: absolute; bottom: 0.06 * 297mm; left: 0.12 * 210mm;
  font-family: 'Noto Serif SC', serif; font-size: 11pt; font-weight: 400;
  letter-spacing: 2pt; color: rgba(31,118,146,0.6);
}
</style>
</head>
<body>
<div class="cover-base"></div>
<div class="cover-bg">
  <div class="cover-bg-grid"></div>
  <div class="watermark-year">2026</div>
</div>
<div class="cover-lines">
  <div class="top-bar"></div>
  <div class="left-anchor"></div>
  <div class="meta-separator"></div>
</div>
<div class="cover-text">
  <div class="content-x">
    <div class="kicker">JAPAN PROPERTY INVESTMENT ASSESSMENT</div>
    <div class="hero-title">日本物業投資<br>評估報告</div>
    <div class="summary">
      第一部分：入場決策、回報因素拆解、84 情景壓力測試<br>
      物業總價 HKD 320 萬 | 首期 60% | 按揭利率 3%
    </div>
    <div class="meta">
      Prepared for Andy<br>
      June 2026
    </div>
  </div>
  <div class="part-tag">PART 1 OF 2 | CHAPTERS 1-3</div>
  <div class="footer">CONFIDENTIAL</div>
</div>
</body>
</html>
