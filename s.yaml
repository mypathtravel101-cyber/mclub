edition: 3.0.0
name: mclub
access: default

vars:
  region: cn-hongkong

resources:
  mclub:
    component: fc3
    props:
      region: ${vars.region}
      functionName: mclub-web
      description: MCLUB CRM - 百盛家族辦公室
      runtime: custom.debian10
      code: ./
      customRuntimeConfig:
        command:
          - ./bootstrap
        port: 3000
      memorySize: 4096
      cpu: 2
      diskSize: 512
      timeout: 60
      instanceConcurrency: 100
      environmentVariables:
        NODE_ENV: production
        DATABASE_URL: file:./db/custom.db
        PORT: "3000"
        HOSTNAME: "0.0.0.0"
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - HEAD
              - OPTIONS
